<!DOCTYPE html>
<html>
<head>
<title>jQuery Example</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){
    var element = $("p").eq(1);

    element.css("color","red");

});
</script>

</head>

<body>

<p>Paragraph 1</p>
<p>Paragraph 2</p>
<p>Paragraph 3</p>
<p>Paragraph 4</p>

</body>
</html>
