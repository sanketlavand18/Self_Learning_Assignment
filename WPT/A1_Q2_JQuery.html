<!-- You are having sample data for the link. Write jQuery code to change the hyperlink 
and the text of an existing link.   -->

<!DOCTYPE html>
<html>
<head>
    <title>Change Link using jQuery</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<a id="myLink" href="https://example.com">Visit Example</a>
<br><br>
<button id="btn">Change Link</button>

<script>
$(document).ready(function() {
    $("#btn").click(function() {
        
        $("#myLink").attr("href", "https://www.google.com");
        
     
        $("#myLink").text("Visit Google");
    });
});
</script>

</body>
</html>
